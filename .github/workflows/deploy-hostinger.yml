name: Deploy to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: hostinger-production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      HOSTINGER_DOMAIN: teachenza.com

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

      - name: Prepare Hostinger SPA artifacts
        run: |
          printf '%s\n' "$GITHUB_SHA" > dist/.deploy-check

          cat > dist/.htaccess <<'EOF'
          <IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteRule ^ index.html [L]
          </IfModule>
          EOF

          find dist -type f ! -name '.deploy-manifest' -printf '%P\n' | LC_ALL=C sort > dist/.deploy-manifest

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy dist to Hostinger
        env:
          HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
          HOSTINGER_PASSWORD: ${{ secrets.HOSTINGER_PASSWORD }}
          HOSTINGER_PORT: ${{ secrets.HOSTINGER_PORT }}
          HOSTINGER_PROTOCOL: ${{ secrets.HOSTINGER_PROTOCOL }}
          HOSTINGER_SERVER_DIR: ${{ secrets.HOSTINGER_SERVER_DIR }}
          HOSTINGER_USERNAME: ${{ secrets.HOSTINGER_USERNAME }}
        run: |
          set -eu

          missing=0
          for var in HOSTINGER_HOST HOSTINGER_USERNAME HOSTINGER_PASSWORD; do
            if [ -z "${!var:-}" ]; then
              echo "::warning::Missing required secret: $var"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            echo "::notice::Hostinger secrets are not fully configured. Skipping deployment."
            exit 0
          fi

          protocol="${HOSTINGER_PROTOCOL:-sftp}"
          if [ "$protocol" = "sftp" ]; then
            port="${HOSTINGER_PORT:-65002}"
          else
            port="${HOSTINGER_PORT:-21}"
          fi
          target_dir="${HOSTINGER_SERVER_DIR:-}"
          domain="${HOSTINGER_DOMAIN:-}"
          # Hostinger addon domains typically live under domains/<domain>/public_html.
          # Auto-correct blank or generic public_html to the domain path for this project.
          if [ -z "$target_dir" ] || [ "$target_dir" = "public_html" ]; then
            if [ -n "$domain" ]; then
              target_dir="domains/${domain}/public_html"
            else
              target_dir="public_html"
            fi
          fi
          remote_prefix=""
          if [ "$target_dir" != "." ]; then
            remote_prefix="${target_dir%/}/"
          fi
          raw_host="${HOSTINGER_HOST}"
          host="$(printf '%s' "$raw_host" | tr -d '[:space:]')"
          host="${host#sftp://}"
          host="${host#ftp://}"
          host="${host#ftps://}"
          host="${host#ssh://}"
          host="${host#scp://}"
          host="${host#*@}"
          host="${host%%/*}"
          host="${host%%:*}"

          if [ -z "$host" ]; then
            echo "::warning::HOSTINGER_HOST resolved to an empty hostname. Store only the bare FTP/SFTP hostname or IP in this secret. Skipping deployment."
            exit 0
          fi

          if [ "$host" != "$raw_host" ]; then
            echo "::notice::Normalized HOSTINGER_HOST from a pasted URL or user@host value. Saving only the bare hostname or IP is recommended."
          fi

          echo "Deploying dist/ via ${protocol} on port ${port} into ${target_dir}"

          remote_manifest_local="$(mktemp)"
          cleanup_script="$(mktemp)"

          if ! lftp -u "$HOSTINGER_USERNAME","$HOSTINGER_PASSWORD" "${protocol}://${host}:${port}" <<EOF
          set cmd:fail-exit no
          set net:max-retries 5
          set net:timeout 30
          set net:reconnect-interval-base 5
          set sftp:auto-confirm yes
          set ssl:verify-certificate no
          set ftp:ssl-allow no
          set ftp:passive-mode yes
          get -O ${remote_manifest_local} ${remote_prefix}.deploy-manifest
          bye
          EOF
          then
            echo "::notice::Remote manifest not found or unreadable. Continuing without cleanup of previous files."
          fi

          if [ -s "$remote_manifest_local" ]; then
            : > "$cleanup_script"
            while IFS= read -r remote_file; do
              if [ -n "$remote_file" ]; then
                printf 'rm %s%s\n' "$remote_prefix" "$remote_file" >> "$cleanup_script"
              fi
            done < "$remote_manifest_local"
            printf 'rm %s.deploy-manifest\n' "$remote_prefix" >> "$cleanup_script"

            lftp -u "$HOSTINGER_USERNAME","$HOSTINGER_PASSWORD" "${protocol}://${host}:${port}" < "$cleanup_script"
          fi

          echo "Deploying build into target webroot: ${target_dir}"
          cd_commands=""
          if [ "$target_dir" != "." ]; then
            cd_commands="mkdir -p ${target_dir}; cd ${target_dir};"
          fi

          lftp -u "$HOSTINGER_USERNAME","$HOSTINGER_PASSWORD" "${protocol}://${host}:${port}" -e "
            set cmd:fail-exit yes;
            set net:max-retries 5;
            set net:timeout 30;
            set net:reconnect-interval-base 5;
            set sftp:auto-confirm yes;
            set ssl:verify-certificate no;
            set ftp:ssl-allow no;
            set ftp:passive-mode yes;
            ${cd_commands}
            set cmd:fail-exit no;
            rm index.php;
            rm default.php;
            set cmd:fail-exit yes;
            mirror --reverse --verbose --parallel=2 dist/ .;
            bye
          "

          if [ -n "$domain" ]; then
            echo "Verifying live domain response from https://${domain}/.deploy-check"
            live_sha="$(curl -fsSL "https://${domain}/.deploy-check" || true)"
            if [ "$live_sha" != "$GITHUB_SHA" ]; then
              echo "::error::Post-deploy verification failed. Uploaded files did not reach the live document root for ${domain}."
              echo "::error::Expected SHA: ${GITHUB_SHA}"
              echo "::error::Live SHA: ${live_sha:-<empty>}"
              exit 1
            fi
          fi
