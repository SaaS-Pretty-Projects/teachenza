name: Deploy to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: hostinger-production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      HOSTINGER_DOMAIN: teachenza.com

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

      - name: Prepare Hostinger SPA artifacts
        run: |
          printf '%s\n' "$GITHUB_SHA" > dist/deploy-check.txt

          cat > dist/.htaccess <<'EOF'
          <IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteRule ^ index.html [L]
          </IfModule>
          EOF

          find dist -type f ! -name '.deploy-manifest' -printf '%P\n' | LC_ALL=C sort > dist/.deploy-manifest

      - name: Deploy dist to Hostinger
        env:
          HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
          HOSTINGER_PASSWORD: ${{ secrets.HOSTINGER_PASSWORD }}
          HOSTINGER_PORT: ${{ secrets.HOSTINGER_PORT }}
          HOSTINGER_PROTOCOL: ${{ secrets.HOSTINGER_PROTOCOL }}
          HOSTINGER_SERVER_DIR: ${{ secrets.HOSTINGER_SERVER_DIR }}
          HOSTINGER_USERNAME: ${{ secrets.HOSTINGER_USERNAME }}
        run: |
          set -eu

          missing=0
          for var in HOSTINGER_HOST HOSTINGER_USERNAME HOSTINGER_PASSWORD; do
            if [ -z "${!var:-}" ]; then
              echo "::warning::Missing required secret: $var"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            echo "::notice::Hostinger secrets are not fully configured. Skipping deployment."
            exit 0
          fi

          protocol="${HOSTINGER_PROTOCOL:-sftp}"
          if [ "$protocol" = "sftp" ]; then
            port="${HOSTINGER_PORT:-65002}"
          else
            port="${HOSTINGER_PORT:-21}"
          fi
          target_dir="${HOSTINGER_SERVER_DIR:-}"
          domain="${HOSTINGER_DOMAIN:-}"
          # Respect explicit HOSTINGER_SERVER_DIR from secrets.
          # Only fall back when no directory was provided.
          if [ -z "$target_dir" ]; then
            if [ -n "$domain" ]; then
              target_dir="domains/${domain}/public_html"
            else
              target_dir="public_html"
            fi
          fi
          remote_prefix=""
          if [ "$target_dir" != "." ]; then
            remote_prefix="${target_dir%/}/"
          fi
          raw_host="${HOSTINGER_HOST}"
          host="$(printf '%s' "$raw_host" | tr -d '[:space:]')"
          host="${host#sftp://}"
          host="${host#ftp://}"
          host="${host#ftps://}"
          host="${host#ssh://}"
          host="${host#scp://}"
          host="${host#*@}"
          host="${host%%/*}"
          host="${host%%:*}"

          if [ -z "$host" ]; then
            echo "::warning::HOSTINGER_HOST resolved to an empty hostname. Store only the bare FTP/SFTP hostname or IP in this secret. Skipping deployment."
            exit 0
          fi

          if [ "$host" != "$raw_host" ]; then
            echo "::notice::Normalized HOSTINGER_HOST from a pasted URL or user@host value. Saving only the bare hostname or IP is recommended."
          fi

          echo "Deploying dist/ via ${protocol} on port ${port} into ${target_dir}"

          if [ "$protocol" != "ftp" ]; then
            echo "::error::This workflow currently supports FTP mode only. Set HOSTINGER_PROTOCOL=ftp."
            exit 1
          fi

          ftp_base="ftp://${host}:${port}"
          if [ "$target_dir" = "." ]; then
            target_dir=""
            remote_prefix=""
          fi

          echo "Deploying build into target webroot: ${target_dir:-.}"

          # Remove known Hostinger placeholder entry files if present.
          curl --silent --show-error --fail --user "$HOSTINGER_USERNAME:$HOSTINGER_PASSWORD" \
            --quote "DELE ${remote_prefix}index.php" "$ftp_base" >/dev/null 2>&1 || true
          curl --silent --show-error --fail --user "$HOSTINGER_USERNAME:$HOSTINGER_PASSWORD" \
            --quote "DELE ${remote_prefix}default.php" "$ftp_base" >/dev/null 2>&1 || true

          # Upload all files in dist/ preserving relative paths.
          while IFS= read -r rel; do
            remote_path="${remote_prefix}${rel}"
            remote_dir="$(dirname "$remote_path")"
            local_file="dist/${rel}"

            if [ "$remote_dir" != "." ]; then
              IFS='/' read -r -a parts <<< "$remote_dir"
              acc=""
              for part in "${parts[@]}"; do
                [ -z "$part" ] && continue
                if [ -z "$acc" ]; then
                  acc="$part"
                else
                  acc="$acc/$part"
                fi
                curl --silent --show-error --fail --user "$HOSTINGER_USERNAME:$HOSTINGER_PASSWORD" \
                  --quote "MKD ${acc}" "$ftp_base" >/dev/null 2>&1 || true
              done
            fi

            curl --silent --show-error --fail --user "$HOSTINGER_USERNAME:$HOSTINGER_PASSWORD" \
              --upload-file "$local_file" "$ftp_base/${remote_path}"
          done < <(cd dist && find . -type f -print | sed 's#^./##')

          if [ -n "$domain" ]; then
            echo "Verifying live domain response from https://${domain}/deploy-check.txt"
            live_sha="$(curl -fsSL "https://${domain}/deploy-check.txt" || true)"
            if [ "$live_sha" != "$GITHUB_SHA" ]; then
              echo "::error::Post-deploy verification failed. Uploaded files did not reach the live document root for ${domain}."
              echo "::error::Expected SHA: ${GITHUB_SHA}"
              echo "::error::Live SHA: ${live_sha:-<empty>}"
              exit 1
            fi
          fi
