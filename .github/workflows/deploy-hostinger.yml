name: Deploy to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: hostinger-production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy dist to Hostinger
        env:
          HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
          HOSTINGER_PASSWORD: ${{ secrets.HOSTINGER_PASSWORD }}
          HOSTINGER_PORT: ${{ secrets.HOSTINGER_PORT }}
          HOSTINGER_PROTOCOL: ${{ secrets.HOSTINGER_PROTOCOL }}
          HOSTINGER_SERVER_DIR: ${{ secrets.HOSTINGER_SERVER_DIR }}
          HOSTINGER_USERNAME: ${{ secrets.HOSTINGER_USERNAME }}
        run: |
          set -eu

          missing=0
          for var in HOSTINGER_HOST HOSTINGER_USERNAME HOSTINGER_PASSWORD; do
            if [ -z "${!var:-}" ]; then
              echo "::error::Missing required secret: $var"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

          protocol="${HOSTINGER_PROTOCOL:-sftp}"
          if [ "$protocol" = "sftp" ]; then
            port="${HOSTINGER_PORT:-65002}"
          else
            port="${HOSTINGER_PORT:-21}"
          fi
          target_dir="${HOSTINGER_SERVER_DIR:-public_html}"
          raw_host="${HOSTINGER_HOST}"
          host="$(printf '%s' "$raw_host" | tr -d '[:space:]')"
          host="${host#sftp://}"
          host="${host#ftp://}"
          host="${host#ftps://}"
          host="${host#ssh://}"
          host="${host#scp://}"
          host="${host#*@}"
          host="${host%%/*}"
          host="${host%%:*}"

          if [ -z "$host" ]; then
            echo "::error::HOSTINGER_HOST resolved to an empty hostname. Store only the Hostinger FTP/SFTP hostname or IP in this secret."
            exit 1
          fi

          if [ "$host" != "$raw_host" ]; then
            echo "::notice::Normalized HOSTINGER_HOST from a pasted URL or user@host value. Saving only the bare hostname or IP is recommended."
          fi

          echo "Deploying dist/ via ${protocol} on port ${port} into ${target_dir}"

          lftp -u "$HOSTINGER_USERNAME","$HOSTINGER_PASSWORD" "${protocol}://${host}:${port}" <<EOF
          set cmd:fail-exit yes
          set net:max-retries 5
          set net:timeout 30
          set net:reconnect-interval-base 5
          set sftp:auto-confirm yes
          set ssl:verify-certificate no
          set ftp:ssl-allow no
          set ftp:passive-mode yes
          $([ "$target_dir" != "." ] && echo "mkdir -p ${target_dir}")
          mirror --reverse --verbose --parallel=2 dist/ ${target_dir}
          bye
          EOF
